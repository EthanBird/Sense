name: Android CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # PRs may supersede an older verification run. Main must finish once it has
  # started publishing, otherwise a canceled upload can leave a partial tag.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  RELEASE_TAG: v0.3.5-m8
  RELEASE_APK: Sense-v0.3.5-m8.apk
  LEXICON_SHA256: ef2fac5d3b62ba3d88674e63a9bfbdc907f0a814b1798fbba25f6ac3cadccce6
  BIGRAM_SHA256: db00a109dde6d1f471172a7abb53aae30509894d6064897a80a502aab690f18c
  ENGLISH_SHA256: 1a182354bc9c944dc28a384c21dbb9a2338e93bd963c4ee33f40b033a8f55624
  ENGLISH_WORD_COUNT: "20000"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify M4 regressions and M5 mixed assets
        run: |
          set -euo pipefail
          python3 tools/test_build_pinyin_lexicon.py
          python3 tools/test_m4_core_assets.py
          python3 tools/test_m5_mixed_assets.py
          python3 tools/build_pinyin_lexicon.py \
            ime-service/src/main/assets/pinyin_lexicon.bin \
            /tmp/pinyin_lexicon.bin \
            --base-binary \
            --custom ime-service/src/main/lexicon/sense_idioms.dict.tsv \
            --custom ime-service/src/main/lexicon/sense_custom.dict.tsv
          cmp ime-service/src/main/assets/pinyin_lexicon.bin /tmp/pinyin_lexicon.bin
          echo "$LEXICON_SHA256  ime-service/src/main/assets/pinyin_lexicon.bin" | sha256sum -c -
          echo "$ENGLISH_SHA256  ime-service/src/main/assets/english_lexicon.txt" | sha256sum -c -
          awk '!/^#/ && NF { count++ } END { print count + 0 }' \
            ime-service/src/main/assets/english_lexicon.txt | grep -Fx "$ENGLISH_WORD_COUNT"

      - name: Verify generated bigram model
        run: |
          set -euo pipefail
          python3 tools/test_build_bigram_model.py
          python3 tools/build_bigram_model.py \
            ime-service/src/main/assets/pinyin_lexicon.bin \
            /tmp/pinyin_bigrams.bin \
            --max-pairs 65536
          cmp ime-service/src/main/assets/pinyin_bigrams.bin /tmp/pinyin_bigrams.bin
          echo "$BIGRAM_SHA256  ime-service/src/main/assets/pinyin_bigrams.bin" | sha256sum -c -

      - name: Verify attributed assets
        run: |
          cmp NOTICE ime-service/src/main/assets/NOTICE.txt
          cmp LICENSE ime-service/src/main/assets/LICENSE.txt
          cmp licenses/rime-pinyin-simp-LICENSE ime-service/src/main/assets/RIME-PINYIN-SIMP-LICENSE.txt
          cmp licenses/CC-CEDICT-NOTICE.md ime-service/src/main/assets/CC-CEDICT-NOTICE.txt
          cmp licenses/CC-BY-SA-4.0.txt ime-service/src/main/assets/CC-BY-SA-4.0.txt
          cmp licenses/popular-english-words-ISC.txt ime-service/src/main/assets/POPULAR-ENGLISH-WORDS-ISC.txt
          cmp licenses/chinese-idiom-chengyu-MIT.txt ime-service/src/main/assets/CHINESE-IDIOM-CHENGYU-MIT.txt

      - name: Verify 0.3.5 M8 AI integration and input regressions
        run: >-
          ./gradlew
          :ai-protocol:test
          :brain-api:test
          :ai-brain:test
          :ai-runtime:testDebugUnitTest
          :core-input:test
          :ime-service:testDebugUnitTest
          :ime-ui:testDebugUnitTest
          :ai-runtime:lintDebug
          :ime-service:lintDebug
          :ime-ui:lintDebug
          :app:lintDebug
          :app:assembleDebug
          :app:assembleBenchmark
          :benchmark:assembleBenchmark

      - name: Verify AI process and dependency boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'android:exported="false"' ai-runtime/src/main/AndroidManifest.xml
          grep -F 'android:process=":brain"' ai-runtime/src/main/AndroidManifest.xml
          merged_manifest=$(
            find app/build/intermediates \
              -type f \
              \( \
                -path '*/merged_manifest/benchmark/*/AndroidManifest.xml' \
                -o \
                -path '*/merged_manifests/benchmark/*/AndroidManifest.xml' \
              \) \
              -print -quit
          )
          test -n "$merged_manifest"
          python3 - "$merged_manifest" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          manifest_path = sys.argv[1]
          android = "{http://schemas.android.com/apk/res/android}"
          root = ET.parse(manifest_path).getroot()
          application = root.find("application")
          if application is None:
              raise SystemExit(f"{manifest_path}: missing application")

          services = application.findall("service")

          def exactly_one(name: str):
              matches = [
                  service
                  for service in services
                  if service.get(android + "name") == name
              ]
              if len(matches) != 1:
                  raise SystemExit(
                      f"{manifest_path}: expected one {name}, found {len(matches)}"
                  )
              return matches[0]

          brain = exactly_one(
              "io.github.ethanbird.senseime.brain.runtime.SenseAiBrainService"
          )
          if brain.get(android + "exported") != "false":
              raise SystemExit(f"{manifest_path}: Brain service must be exported=false")
          if brain.get(android + "process") != ":brain":
              raise SystemExit(f"{manifest_path}: Brain service must run in :brain")

          ime = exactly_one(
              "io.github.ethanbird.senseime.service.SenseInputMethodService"
          )
          if ime.get(android + "permission") != "android.permission.BIND_INPUT_METHOD":
              raise SystemExit(
                  f"{manifest_path}: IME service must require BIND_INPUT_METHOD"
              )
          actions = {
              action.get(android + "name")
              for action in ime.findall("./intent-filter/action")
          }
          if "android.view.InputMethod" not in actions:
              raise SystemExit(f"{manifest_path}: IME service is missing InputMethod action")
          PY
          if rg -n 'java\.net\.|javax\.net\.|okhttp|retrofit' ime-service ime-ui; then
            echo 'Release gate failed: network transport leaked into the IME or UI module.' >&2
            exit 1
          fi

      - name: Verify M0 through M6 host benchmarks
        run: >-
          ./gradlew
          --no-parallel
          :core-input:m0HostBenchmark
          :core-input:m1PinyinBenchmark
          :core-input:m2AdaptiveBenchmark
          :core-input:m3SentenceBenchmark
          :core-input:m4CoreBenchmark
          :core-input:m5MixedInputBenchmark
          :core-input:m6InputPolishBenchmark

      - name: Verify assembled 0.3.5 M8 APK
        shell: bash
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/benchmark -type f -name '*.apk' -print -quit)
          test -n "$apk"
          sdk=${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}
          test -n "$sdk"
          build_tools=$(find "$sdk/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          test -x "$build_tools/apksigner"
          test -x "$build_tools/aapt2"
          test -x "$build_tools/zipalign"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk"
          "$build_tools/zipalign" -c -P 16 4 "$apk"
          "$build_tools/aapt2" dump badging "$apk" > /tmp/apk-badging.txt
          "$build_tools/aapt2" dump permissions "$apk" > /tmp/apk-permissions.txt
          apk_analyzer=$(
            find "$sdk/cmdline-tools" -type f -name apkanalyzer -print |
              sort -V |
              tail -n 1
          )
          test -x "$apk_analyzer"
          "$apk_analyzer" manifest print "$apk" > /tmp/apk-manifest.xml
          python3 - /tmp/apk-manifest.xml <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          manifest_path = sys.argv[1]
          android = "{http://schemas.android.com/apk/res/android}"
          root = ET.parse(manifest_path).getroot()
          application = root.find("application")
          if application is None:
              raise SystemExit(f"{manifest_path}: missing application")
          services = application.findall("service")

          def exactly_one(name: str):
              matches = [
                  service
                  for service in services
                  if service.get(android + "name") == name
              ]
              if len(matches) != 1:
                  raise SystemExit(
                      f"{manifest_path}: expected one {name}, found {len(matches)}"
                  )
              return matches[0]

          brain = exactly_one(
              "io.github.ethanbird.senseime.brain.runtime.SenseAiBrainService"
          )
          if brain.get(android + "exported") != "false":
              raise SystemExit(f"{manifest_path}: Brain service must be exported=false")
          if brain.get(android + "process") != ":brain":
              raise SystemExit(f"{manifest_path}: Brain service must run in :brain")

          ime = exactly_one(
              "io.github.ethanbird.senseime.service.SenseInputMethodService"
          )
          if ime.get(android + "permission") != "android.permission.BIND_INPUT_METHOD":
              raise SystemExit(
                  f"{manifest_path}: IME service must require BIND_INPUT_METHOD"
              )
          actions = {
              action.get(android + "name")
              for action in ime.findall("./intent-filter/action")
          }
          if "android.view.InputMethod" not in actions:
              raise SystemExit(f"{manifest_path}: IME service is missing InputMethod action")
          PY
          grep -F "package: name='io.github.ethanbird.senseime' versionCode='12' versionName='0.3.5-m8'" /tmp/apk-badging.txt
          grep -Fx "minSdkVersion:'29'" /tmp/apk-badging.txt
          grep -Fx "targetSdkVersion:'36'" /tmp/apk-badging.txt
          declared_permissions=$(
            sed -n -E \
              "s/^uses-permission(-sdk-[0-9]+)?: name='([^']+)'.*/\2/p" \
              /tmp/apk-permissions.txt |
              sort -u
          )
          if ! grep -Fxq 'android.permission.INTERNET' <<<"$declared_permissions"; then
            echo 'Release gate failed: AI build is missing android.permission.INTERNET.' >&2
            exit 1
          fi
          unexpected_permissions=$(
            grep -Fvx 'android.permission.INTERNET' <<<"$declared_permissions" || true
          )
          test -z "$unexpected_permissions"
          unzip -p "$apk" assets/NOTICE.txt | cmp - NOTICE
          unzip -p "$apk" assets/LICENSE.txt | cmp - LICENSE
          unzip -p "$apk" assets/RIME-PINYIN-SIMP-LICENSE.txt | cmp - licenses/rime-pinyin-simp-LICENSE
          unzip -p "$apk" assets/CC-CEDICT-NOTICE.txt | cmp - licenses/CC-CEDICT-NOTICE.md
          unzip -p "$apk" assets/CC-BY-SA-4.0.txt | cmp - licenses/CC-BY-SA-4.0.txt
          unzip -p "$apk" assets/POPULAR-ENGLISH-WORDS-ISC.txt | cmp - licenses/popular-english-words-ISC.txt
          unzip -p "$apk" assets/CHINESE-IDIOM-CHENGYU-MIT.txt | cmp - licenses/chinese-idiom-chengyu-MIT.txt
          unzip -p "$apk" assets/pinyin_lexicon.bin | sha256sum | awk '{print $1}' | grep -Fx "$LEXICON_SHA256"
          unzip -p "$apk" assets/pinyin_bigrams.bin | sha256sum | awk '{print $1}' | grep -Fx "$BIGRAM_SHA256"
          unzip -p "$apk" assets/english_lexicon.txt | sha256sum | awk '{print $1}' | grep -Fx "$ENGLISH_SHA256"
          unzip -p "$apk" assets/english_lexicon.txt |
            awk '!/^#/ && NF { count++ } END { print count + 0 }' |
            grep -Fx "$ENGLISH_WORD_COUNT"

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: sense-v0.3.5-m8-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/benchmark/*.apk
            benchmark/build/outputs/apk/benchmark/*.apk
            benchmarks/results/m4-core.json
            benchmarks/results/m5-mixed-input.json
            benchmarks/results/m6-input-polish.json
          if-no-files-found: error

  release-0-3-5-m8:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: sense-v0.3.5-m8-apks
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          apk=$(find artifacts -type f -path '*/app/build/outputs/apk/benchmark/*.apk' -print -quit)
          test -n "$apk"
          sdk=${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}
          test -n "$sdk"
          build_tools=$(find "$sdk/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          test -x "$build_tools/apksigner"
          test -x "$build_tools/aapt2"
          test -x "$build_tools/zipalign"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk" | tee release/apksigner.txt
          "$build_tools/zipalign" -c -P 16 4 "$apk"
          "$build_tools/aapt2" dump badging "$apk" | tee release/apk-badging.txt
          "$build_tools/aapt2" dump permissions "$apk" | tee release/apk-permissions.txt
          apk_analyzer=$(
            find "$sdk/cmdline-tools" -type f -name apkanalyzer -print |
              sort -V |
              tail -n 1
          )
          test -x "$apk_analyzer"
          "$apk_analyzer" manifest print "$apk" > release/apk-manifest.xml
          python3 - release/apk-manifest.xml <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          manifest_path = sys.argv[1]
          android = "{http://schemas.android.com/apk/res/android}"
          root = ET.parse(manifest_path).getroot()
          application = root.find("application")
          if application is None:
              raise SystemExit(f"{manifest_path}: missing application")
          services = application.findall("service")

          def exactly_one(name: str):
              matches = [
                  service
                  for service in services
                  if service.get(android + "name") == name
              ]
              if len(matches) != 1:
                  raise SystemExit(
                      f"{manifest_path}: expected one {name}, found {len(matches)}"
                  )
              return matches[0]

          brain = exactly_one(
              "io.github.ethanbird.senseime.brain.runtime.SenseAiBrainService"
          )
          if brain.get(android + "exported") != "false":
              raise SystemExit(f"{manifest_path}: Brain service must be exported=false")
          if brain.get(android + "process") != ":brain":
              raise SystemExit(f"{manifest_path}: Brain service must run in :brain")

          ime = exactly_one(
              "io.github.ethanbird.senseime.service.SenseInputMethodService"
          )
          if ime.get(android + "permission") != "android.permission.BIND_INPUT_METHOD":
              raise SystemExit(
                  f"{manifest_path}: IME service must require BIND_INPUT_METHOD"
              )
          actions = {
              action.get(android + "name")
              for action in ime.findall("./intent-filter/action")
          }
          if "android.view.InputMethod" not in actions:
              raise SystemExit(f"{manifest_path}: IME service is missing InputMethod action")
          PY
          grep -F "package: name='io.github.ethanbird.senseime' versionCode='12' versionName='0.3.5-m8'" release/apk-badging.txt
          grep -Fx "minSdkVersion:'29'" release/apk-badging.txt
          grep -Fx "targetSdkVersion:'36'" release/apk-badging.txt
          declared_permissions=$(
            sed -n -E \
              "s/^uses-permission(-sdk-[0-9]+)?: name='([^']+)'.*/\2/p" \
              release/apk-permissions.txt |
              sort -u
          )
          if ! grep -Fxq 'android.permission.INTERNET' <<<"$declared_permissions"; then
            echo 'Release gate failed: AI build is missing android.permission.INTERNET.' >&2
            exit 1
          fi
          unexpected_permissions=$(
            grep -Fvx 'android.permission.INTERNET' <<<"$declared_permissions" || true
          )
          test -z "$unexpected_permissions"
          unzip -p "$apk" assets/NOTICE.txt | cmp - NOTICE
          unzip -p "$apk" assets/LICENSE.txt | cmp - LICENSE
          unzip -p "$apk" assets/RIME-PINYIN-SIMP-LICENSE.txt | cmp - licenses/rime-pinyin-simp-LICENSE
          unzip -p "$apk" assets/CC-CEDICT-NOTICE.txt | cmp - licenses/CC-CEDICT-NOTICE.md
          unzip -p "$apk" assets/CC-BY-SA-4.0.txt | cmp - licenses/CC-BY-SA-4.0.txt
          unzip -p "$apk" assets/POPULAR-ENGLISH-WORDS-ISC.txt | cmp - licenses/popular-english-words-ISC.txt
          unzip -p "$apk" assets/CHINESE-IDIOM-CHENGYU-MIT.txt | cmp - licenses/chinese-idiom-chengyu-MIT.txt
          unzip -p "$apk" assets/pinyin_lexicon.bin | sha256sum | awk '{print $1}' | grep -Fx "$LEXICON_SHA256"
          unzip -p "$apk" assets/pinyin_bigrams.bin | sha256sum | awk '{print $1}' | grep -Fx "$BIGRAM_SHA256"
          unzip -p "$apk" assets/english_lexicon.txt | sha256sum | awk '{print $1}' | grep -Fx "$ENGLISH_SHA256"
          unzip -p "$apk" assets/english_lexicon.txt |
            awk '!/^#/ && NF { count++ } END { print count + 0 }' |
            grep -Fx "$ENGLISH_WORD_COUNT"
          cp "$apk" "release/$RELEASE_APK"
          cd release
          sha256sum "$RELEASE_APK" > SHA256SUMS.txt

      - name: Create 0.3.5 M8 prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            target=$(gh release view "$RELEASE_TAG" --json targetCommitish --jq .targetCommitish)
            if [[ "$target" != "$GITHUB_SHA" ]]; then
              echo "$RELEASE_TAG already targets $target instead of $GITHUB_SHA" >&2
              exit 1
            fi
            # Heal an earlier interrupted upload at the same commit before
            # validating it. This keeps reruns idempotent even if GitHub had
            # created the release/tag but not every asset.
            gh release upload "$RELEASE_TAG" \
              "release/$RELEASE_APK" \
              release/SHA256SUMS.txt \
              --clobber
            mkdir -p existing-release
            gh release download "$RELEASE_TAG" \
              --pattern "$RELEASE_APK" \
              --pattern SHA256SUMS.txt \
              --dir existing-release
            (cd existing-release && sha256sum -c SHA256SUMS.txt)
            echo "$RELEASE_TAG already exists at the expected commit and its checksum is valid."
          else
            if existing_tag=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" --jq .object.sha 2>/dev/null); then
              if [[ "$existing_tag" != "$GITHUB_SHA" ]]; then
                echo "$RELEASE_TAG already points to $existing_tag instead of $GITHUB_SHA" >&2
                exit 1
              fi
            fi
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Sense v0.3.5-m8 · 长按空格 AI 编辑" \
              --notes-file docs/releases/v0.3.5-m8.md \
              --prerelease \
              "release/$RELEASE_APK" \
              release/SHA256SUMS.txt
          fi
